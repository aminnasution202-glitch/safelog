<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SafeTrans Jobs — Loker Sopir & Logistik</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============================= TOKENS ============================= */
:root{
  --ink:#11151C;
  --ink-soft:#3A4150;
  --slate:#6B7280;
  --slate-light:#9AA3AF;
  --cloud:#F2F5F8;
  --surface:#FFFFFF;
  --line:#E4E9EE;
  --blue:#2F6FED;
  --blue-dark:#1E54C7;
  --blue-soft:#E9F0FE;
  --amber:#FFB020;
  --amber-soft:#FFF4DE;
  --amber-deep:#B97200;
  --teal:#1B9E6B;
  --teal-soft:#E1F7EE;
  --red:#E0473F;
  --red-soft:#FBE7E6;

  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:11px;
  --radius-pill:999px;

  --shadow-sm:0 1px 2px rgba(17,21,28,.05), 0 1px 1px rgba(17,21,28,.04);
  --shadow-md:0 10px 24px -6px rgba(17,21,28,.10), 0 2px 6px rgba(17,21,28,.04);
  --shadow-lg:0 22px 48px -12px rgba(17,21,28,.18);

  --font-display:'Space Grotesk', 'Inter', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;

  --header-h:64px;
  --nav-h:64px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--cloud);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important; transition-duration:.001s !important;}
}

/* ============================= APP SHELL ============================= */
#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:var(--cloud);
  position:relative;
  display:flex;
  flex-direction:column;
}

/* ---------- Header ---------- */
.header{
  position:sticky; top:0; z-index:40;
  background:var(--ink);
  color:#fff;
  padding:10px 16px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.header-row{
  display:flex; align-items:center; gap:10px;
  height:46px;
}
.brand{
  display:flex; align-items:center; gap:8px;
  flex:0 0 auto;
}
.brand-mark{
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg, var(--blue), #5B8DFF);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:14px; color:#fff;
  box-shadow:0 4px 10px rgba(47,111,237,.4);
}
.category-select{
  flex:1 1 auto;
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-pill);
  padding:8px 12px;
  color:#fff;
  font-size:13px; font-weight:600;
  font-family:var(--font-body);
  min-width:0;
  position:relative;
}
.category-select span{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.category-select svg{flex:0 0 auto; transition:transform .25s ease;}
.category-select.open svg{transform:rotate(180deg);}
.icon-btn{
  flex:0 0 auto;
  width:38px;height:38px;
  border-radius:var(--radius-pill);
  border:none;background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  color:#fff;
  transition:background .2s, transform .15s;
}
.icon-btn:active{transform:scale(.92); background:rgba(255,255,255,.16);}

.search-wrap{
  max-height:0;
  overflow:hidden;
  transition:max-height .28s cubic-bezier(.4,0,.2,1), padding .28s;
}
.search-wrap.open{ max-height:56px; padding-bottom:10px;}
.search-box{
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.1);
  border-radius:var(--radius-pill);
  padding:9px 14px;
  margin-top:8px;
}
.search-box input{
  flex:1; background:none; border:none; outline:none;
  color:#fff; font-size:14px;
}
.search-box input::placeholder{color:rgba(255,255,255,.5);}
.search-box svg{color:rgba(255,255,255,.6); flex:0 0 auto;}

.dropdown-panel{
  position:absolute; top:64px; left:16px;
  background:var(--surface); color:var(--ink);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);
  width:min(260px, calc(100% - 32px));
  padding:6px;
  z-index:50;
  opacity:0; transform:translateY(-6px) scale(.98);
  pointer-events:none;
  transition:opacity .18s ease, transform .18s ease;
}
.dropdown-panel.show{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
.dropdown-item{
  padding:10px 12px; border-radius:var(--radius-sm);
  font-size:14px; font-weight:500; color:var(--ink-soft);
  display:flex; align-items:center; justify-content:space-between;
}
.dropdown-item:active{background:var(--cloud);}
.dropdown-item.active{background:var(--blue-soft); color:var(--blue-dark); font-weight:600;}

/* ---------- Tabs ---------- */
.tabs-bar{
  display:flex; gap:4px;
  padding:10px 12px 0;
  background:var(--surface);
  border-bottom:1px solid var(--line);
  overflow-x:auto;
  scrollbar-width:none;
  position:sticky; top:var(--header-h); z-index:30;
}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{
  position:relative;
  flex:0 0 auto;
  background:none; border:none;
  padding:8px 14px 14px;
  font-size:13.5px; font-weight:600;
  color:var(--slate);
  white-space:nowrap;
}
.tab-btn.active{color:var(--ink);}
.tab-underline{
  position:absolute; bottom:0; height:3px; border-radius:3px 3px 0 0;
  background:var(--blue);
  transition:left .3s cubic-bezier(.4,0,.2,1), width .3s cubic-bezier(.4,0,.2,1);
}

/* ---------- Filter bar ---------- */
.filter-bar{
  display:flex; align-items:center; gap:8px;
  padding:10px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--line);
  position:sticky; top:calc(var(--header-h) + 41px); z-index:25;
  overflow-x:auto;
  scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{
  flex:0 0 auto;
  display:flex; align-items:center; gap:6px;
  border:1px solid var(--line);
  background:var(--surface);
  padding:7px 12px;
  border-radius:var(--radius-pill);
  font-size:12.5px; font-weight:600; color:var(--ink-soft);
  transition:border-color .15s, color .15s, background .15s;
}
.filter-chip.primary{
  border:none; background:var(--ink); color:#fff;
}
.filter-chip.active{ border-color:var(--blue); color:var(--blue-dark); background:var(--blue-soft);}
.filter-chip svg{flex:0 0 auto;}
.result-count{
  margin-left:auto; flex:0 0 auto;
  font-size:12px; color:var(--slate-light); font-weight:500;
}

/* ---------- Demo banner ---------- */
.demo-banner{
  margin:10px 16px 0;
  background:var(--amber-soft);
  border:1px solid #FFE2A8;
  color:var(--amber-deep);
  font-size:12px; font-weight:600;
  padding:9px 12px;
  border-radius:var(--radius-sm);
  display:flex; align-items:center; gap:8px;
}
.demo-banner button{
  margin-left:auto; background:none; border:none; color:var(--amber-deep);
  font-weight:700; font-size:12px; opacity:.7;
}

/* ---------- List ---------- */
.list-view{
  flex:1;
  padding:14px 16px calc(var(--nav-h) + var(--safe-b) + 24px);
}
.section-label{
  font-family:var(--font-display);
  font-size:12px; letter-spacing:.06em; text-transform:uppercase;
  color:var(--slate-light); font-weight:700;
  margin:18px 2px 10px;
}

/* ---------- Job Card (ticket motif) ---------- */
.job-card{
  background:var(--surface);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);
  margin-bottom:14px;
  padding:16px 16px 14px;
  position:relative;
  border:1px solid var(--line);
  opacity:0; transform:translateY(14px);
  animation:cardIn .45s cubic-bezier(.2,.7,.3,1) forwards;
  transition:box-shadow .2s, transform .15s;
}
.job-card:active{ transform:translateY(0) scale(.985); }
@keyframes cardIn{ to{ opacity:1; transform:translateY(0);} }

.card-top{
  display:flex; align-items:flex-start; gap:6px;
  margin-bottom:12px;
}
.badge{
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:700;
  padding:4px 8px; border-radius:var(--radius-pill);
}
.badge-verified{ background:var(--teal-soft); color:var(--teal);}
.badge-urgent{ background:var(--amber-soft); color:var(--amber-deep);}
.badge-urgent svg{ animation:pulseBolt 1.8s ease-in-out infinite;}
@keyframes pulseBolt{ 0%,100%{opacity:1;} 50%{opacity:.55;} }

.bookmark-btn{
  margin-left:auto;
  width:32px;height:32px; flex:0 0 auto;
  border:none; background:var(--cloud); border-radius:var(--radius-pill);
  display:flex; align-items:center; justify-content:center;
  color:var(--slate);
  transition:background .15s, color .15s, transform .15s;
}
.bookmark-btn.saved{ background:var(--blue-soft); color:var(--blue);}
.bookmark-btn:active{ transform:scale(.88);}

.card-main{
  display:flex; gap:12px;
  margin-bottom:12px;
}
.company-logo{
  width:48px;height:48px; border-radius:14px; flex:0 0 auto;
  background:var(--ink); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:17px;
}
.job-title{
  font-family:var(--font-display);
  font-size:16px; font-weight:700; color:var(--ink);
  line-height:1.25; margin:0 0 3px;
}
.company-name{
  font-size:13px; color:var(--slate); font-weight:500;
  display:flex; align-items:center; gap:4px;
}
.company-name svg{ color:var(--teal); flex:0 0 auto;}

.route-line{
  display:flex; align-items:center; gap:6px;
  font-size:12.5px; color:var(--slate); font-weight:500;
  margin-bottom:12px;
}
.route-line .dash{
  flex:0 0 26px; height:1px;
  background:repeating-linear-gradient(to right, var(--slate-light) 0 4px, transparent 4px 7px);
}
.route-line svg{ flex:0 0 auto; color:var(--slate-light);}

.tag-row{
  display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;
}
.tag{
  font-size:11.5px; font-weight:600; color:var(--ink-soft);
  background:var(--cloud); padding:5px 10px; border-radius:var(--radius-pill);
}

.salary-strip{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--ink); border-radius:var(--radius-sm);
  padding:10px 12px; margin-bottom:12px;
}
.salary-value{
  font-family:var(--font-mono); font-weight:600; font-size:14px;
  color:var(--amber); letter-spacing:.01em;
}
.salary-period{ font-size:10.5px; color:rgba(255,255,255,.5); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}

.recruiter-row{
  display:flex; align-items:center; gap:8px; margin-bottom:14px;
}
.recruiter-avatar{
  width:24px;height:24px;border-radius:var(--radius-pill);
  background:var(--blue-soft); color:var(--blue-dark);
  font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex:0 0 auto;
}
.recruiter-text{ font-size:12px; color:var(--slate); }
.recruiter-text b{ color:var(--ink-soft); font-weight:600;}
.posted-time{ margin-left:auto; font-size:11.5px; color:var(--slate-light);}

.apply-btn{
  width:100%; border:none; border-radius:var(--radius-pill);
  background:var(--blue); color:#fff;
  font-size:14.5px; font-weight:700;
  padding:13px; display:flex; align-items:center; justify-content:center; gap:6px;
  box-shadow:0 8px 18px -4px rgba(47,111,237,.45);
  transition:background .15s, transform .12s;
}
.apply-btn:active{ background:var(--blue-dark); transform:scale(.98);}
.apply-btn svg{ transition:transform .15s;}
.apply-btn:active svg{ transform:translateX(2px);}

/* ---------- Skeletons ---------- */
.skeleton-card{
  background:var(--surface); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm); padding:16px; margin-bottom:14px; border:1px solid var(--line);
}
.sk-row{ display:flex; gap:12px; margin-bottom:14px;}
.sk-box{
  border-radius:14px;
  background:linear-gradient(100deg, #ECEFF3 30%, #F6F8FA 50%, #ECEFF3 70%);
  background-size:200% 100%;
  animation:shimmer 1.4s ease-in-out infinite;
}
@keyframes shimmer{ 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
.sk-logo{ width:48px;height:48px; border-radius:14px;}
.sk-lines{ flex:1; display:flex; flex-direction:column; gap:8px; justify-content:center;}
.sk-line{ height:11px; border-radius:6px;}
.sk-full{ height:38px; border-radius:11px; margin-bottom:12px;}
.sk-btn{ height:42px; border-radius:999px;}

/* ---------- Empty state ---------- */
.empty-state{
  text-align:center; padding:60px 24px 40px; color:var(--slate);
}
.empty-state svg{ color:var(--slate-light); margin-bottom:14px;}
.empty-state h3{
  font-family:var(--font-display); color:var(--ink); margin:0 0 6px; font-size:16px;
}
.empty-state p{ font-size:13px; margin:0; line-height:1.5;}

/* ============================= DETAIL VIEW ============================= */
.detail-view{
  position:fixed; inset:0; max-width:480px; margin:0 auto;
  background:var(--cloud);
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.22,.61,.36,1);
  z-index:100; overflow-y:auto;
  display:flex; flex-direction:column;
}
.detail-view.show{ transform:translateX(0); }

.detail-header{
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; gap:10px;
  padding:14px 16px;
  background:linear-gradient(180deg, rgba(17,21,28,.55), rgba(17,21,28,0));
}
.detail-header .icon-btn{ background:rgba(255,255,255,.18); backdrop-filter:blur(6px);}
.detail-header .spacer{ flex:1;}

.detail-hero{
  background:var(--ink);
  padding:0 20px 26px; margin-top:-56px; padding-top:56px;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.detail-hero::after{
  content:''; position:absolute; right:-40px; top:-40px; width:180px; height:180px;
  border-radius:50%; background:radial-gradient(circle, rgba(47,111,237,.35), transparent 70%);
}
.detail-logo{
  width:58px;height:58px;border-radius:16px;
  background:linear-gradient(135deg, var(--blue), #5B8DFF);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:21px; color:#fff;
  margin-bottom:14px; position:relative; z-index:1;
}
.detail-title{ font-family:var(--font-display); font-size:21px; font-weight:700; margin:0 0 6px; position:relative; z-index:1;}
.detail-company{ display:flex; align-items:center; gap:6px; font-size:13.5px; color:rgba(255,255,255,.75); font-weight:500; position:relative; z-index:1;}
.detail-company svg{ color:var(--teal);}
.detail-meta-row{
  display:flex; gap:14px; margin-top:14px; position:relative; z-index:1;
  font-size:12px; color:rgba(255,255,255,.65);
}
.detail-meta-row span{ display:flex; align-items:center; gap:5px;}

.stat-strip{
  display:flex; gap:10px; padding:16px; margin-top:-16px; position:relative; z-index:2;
  overflow-x:auto; scrollbar-width:none;
}
.stat-strip::-webkit-scrollbar{display:none;}
.stat-pill{
  flex:0 0 auto; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--radius-md); padding:10px 14px; box-shadow:var(--shadow-sm);
  min-width:108px;
}
.stat-pill .lbl{ font-size:10px; color:var(--slate-light); font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px;}
.stat-pill .val{ font-size:13.5px; font-weight:700; color:var(--ink); font-family:var(--font-mono);}
.stat-pill.salary{ background:var(--ink); border:none;}
.stat-pill.salary .lbl{ color:rgba(255,255,255,.5);}
.stat-pill.salary .val{ color:var(--amber);}

.detail-section{
  background:var(--surface); margin:0 16px 14px; padding:18px;
  border-radius:var(--radius-lg); border:1px solid var(--line); box-shadow:var(--shadow-sm);
}
.detail-section h4{
  font-family:var(--font-display); font-size:14.5px; margin:0 0 12px; color:var(--ink);
  display:flex; align-items:center; gap:7px;
}
.detail-section p{ font-size:13.5px; line-height:1.65; color:var(--ink-soft); margin:0;}
.req-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px;}
.req-list li{ display:flex; gap:9px; font-size:13.5px; color:var(--ink-soft); line-height:1.5;}
.req-list svg{ flex:0 0 auto; color:var(--teal); margin-top:2px;}
.benefit-row{ display:flex; gap:8px; flex-wrap:wrap;}

.company-card{ display:flex; align-items:center; gap:12px;}
.company-card .logo-sm{ width:44px;height:44px;border-radius:13px; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700;}
.company-card .info{ flex:1;}
.company-card .info .name{ font-weight:700; font-size:14px; display:flex; align-items:center; gap:5px;}
.company-card .info .name svg{color:var(--teal);}
.company-card .info .rating{ font-size:12px; color:var(--slate); display:flex; align-items:center; gap:4px; margin-top:3px;}
.company-card .info .rating svg{ color:var(--amber); width:13px; height:13px;}

.recruiter-card{ display:flex; align-items:center; gap:12px;}
.recruiter-card .av{
  width:46px;height:46px;border-radius:var(--radius-pill); background:var(--blue-soft); color:var(--blue-dark);
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; flex:0 0 auto;
}
.recruiter-card .info{ flex:1;}
.recruiter-card .info .name{ font-weight:700; font-size:14px;}
.recruiter-card .info .role{ font-size:12px; color:var(--slate); margin-top:2px;}
.chat-btn{
  border:1.5px solid var(--blue); color:var(--blue); background:none;
  border-radius:var(--radius-pill); padding:9px 14px; font-size:12.5px; font-weight:700;
  display:flex; align-items:center; gap:6px; flex:0 0 auto;
}
.chat-btn:active{ background:var(--blue-soft);}

.detail-sticky-bar{
  position:sticky; bottom:0; z-index:10;
  background:var(--surface); border-top:1px solid var(--line);
  padding:12px 16px calc(12px + var(--safe-b));
  display:flex; gap:10px; margin-top:auto;
  box-shadow:0 -8px 20px rgba(17,21,28,.06);
}
.save-toggle-btn{
  width:48px; height:48px; flex:0 0 auto; border-radius:var(--radius-md);
  border:1.5px solid var(--line); background:var(--surface);
  display:flex; align-items:center; justify-content:center; color:var(--slate);
}
.save-toggle-btn.saved{ border-color:var(--blue); color:var(--blue); background:var(--blue-soft);}
.detail-sticky-bar .apply-btn{ flex:1; padding:14px;}

/* ============================= FILTER SHEET ============================= */
.sheet-overlay{
  position:fixed; inset:0; background:rgba(17,21,28,.5);
  z-index:200; opacity:0; pointer-events:none; transition:opacity .25s;
}
.sheet-overlay.show{ opacity:1; pointer-events:auto;}
.filter-sheet{
  position:fixed; left:0; right:0; bottom:0; max-width:480px; margin:0 auto;
  background:var(--surface); border-radius:24px 24px 0 0;
  z-index:201; max-height:86vh; display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .32s cubic-bezier(.22,.61,.36,1);
  box-shadow:var(--shadow-lg);
}
.filter-sheet.show{ transform:translateY(0);}
.sheet-handle{ width:36px; height:4px; background:var(--line); border-radius:4px; margin:10px auto 4px;}
.sheet-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 18px 14px; border-bottom:1px solid var(--line);
}
.sheet-header h3{ font-family:var(--font-display); font-size:17px; margin:0;}
.sheet-body{ padding:18px; overflow-y:auto; flex:1;}
.filter-group{ margin-bottom:22px;}
.filter-group .lbl{ font-size:12.5px; font-weight:700; color:var(--ink-soft); margin-bottom:10px; text-transform:uppercase; letter-spacing:.03em;}
.chip-grid{ display:flex; flex-wrap:wrap; gap:8px;}
.opt-chip{
  border:1.5px solid var(--line); background:var(--surface); color:var(--ink-soft);
  padding:8px 14px; border-radius:var(--radius-pill); font-size:13px; font-weight:600;
  transition:all .15s;
}
.opt-chip.active{ border-color:var(--blue); background:var(--blue-soft); color:var(--blue-dark);}

async function loadJobs(){
  state.loading = true;
  renderList();
  if(CONFIG.SCRIPT_URL){
    try{
      const ctrl = new AbortController();
      const t = setTimeout(()=>ctrl.abort(), CONFIG.FETCH_TIMEOUT_MS);
      const res = await fetch(CONFIG.SCRIPT_URL, {signal: ctrl.signal});
      clearTimeout(t);
      if(!res.ok) throw new Error("Bad response");
      const data = await res.json();
      state.jobs = Array.isArray(data) ? data : (data.jobs || []);
      state.usingDemo = false;
    }catch(err){
      console.warn("Gagal memuat dari Google Sheets, memakai data demo:", err);
      state.jobs = DEMO_JOBS;
      state.usingDemo = true;
    }
  } else {
    await new Promise(r=>setTimeout(r, 700)); // simulate network for skeleton UX
    state.jobs = DEMO_JOBS;
    state.usingDemo = true;
  }
  state.loading = false;
  renderList();
}

function getFilteredJobs(){
  let list = [...state.jobs];

  if(state.activeCategory !== "Semua Kategori"){
    list = list.filter(j => j.category === state.activeCategory);
  }
  if(state.searchQuery.trim()){
    const q = state.searchQuery.trim().toLowerCase();
    list = list.filter(j => j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q) || j.location.toLowerCase().includes(q));
  }
  const f = state.filters;
  if(f.categories.length) list = list.filter(j => f.categories.includes(j.category));
  if(f.jobTypes.length) list = list.filter(j => f.jobTypes.includes(j.jobType));
  if(f.experience.length) list = list.filter(j => f.experience.includes(j.experience));
  if(f.minSalary > 0) list = list.filter(j => j.salaryMax >= f.minSalary);
  if(f.urgentOnly) list = list.filter(j => j.urgent);

  if(state.activeTab === "terdekat") list.sort((a,b)=>a.distanceKm-b.distanceKm);
  else if(state.activeTab === "gaji") list.sort((a,b)=>b.salaryMax-a.salaryMax);
  else if(state.activeTab === "mendesak") list = list.filter(j=>j.urgent);
  else {
    if(f.sort === "Gaji Tertinggi") list.sort((a,b)=>b.salaryMax-a.salaryMax);
    else if(f.sort === "Jarak Terdekat") list.sort((a,b)=>a.distanceKm-b.distanceKm);
    else list.sort((a,b)=>a.postedHoursAgo-b.postedHoursAgo);
  }
  return list;
}

/* ---------------------------- RENDER: TABS ---------------------------- */
function renderTabs(){
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = TABS.map(t=>`<button class="tab-btn ${t.id===state.activeTab?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('') + '<div class="tab-underline" id="tabUnderline"></div>';
  bar.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.activeTab = btn.dataset.tab;
      renderTabs();
      renderList();
    });
  });
  requestAnimationFrame(positionUnderline);
}
function positionUnderline(){
  const active = document.querySelector('.tab-btn.active');
  const underline = document.getElementById('tabUnderline');
  if(active && underline){
    underline.style.left = active.offsetLeft + 'px';
    underline.style.width = active.offsetWidth + 'px';
  }
}

/* ---------------------------- RENDER: CATEGORY DROPDOWN ---------------------------- */
function renderCategoryPanel(){
  const panel = document.getElementById('categoryPanel');
  panel.innerHTML = CATEGORIES.map(c=>`<div class="dropdown-item ${c===state.activeCategory?'active':''}" data-cat="${c}">${c}${c===state.activeCategory? ICON.check:''}</div>`).join('');
  panel.querySelectorAll('.dropdown-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      state.activeCategory = item.dataset.cat;
      document.getElementById('categoryLabel').textContent = state.activeCategory;
      closeDropdown();
      renderList();
    });
  });
}
function closeDropdown(){
  document.getElementById('categoryPanel').classList.remove('show');
  document.getElementById('categoryBtn').classList.remove('open');
}

/* ---------------------------- RENDER: SKELETONS ---------------------------- */
function skeletonHTML(){
  let out = '';
  for(let i=0;i<4;i++){
    out += `<div class="skeleton-card">
      <div class="sk-row">
        <div class="sk-box sk-logo"></div>
        <div class="sk-lines">
          <div class="sk-box sk-line" style="width:70%"></div>
          <div class="sk-box sk-line" style="width:45%"></div>
        </div>
      </div>
      <div class="sk-box sk-full" style="width:60%;height:14px;margin-bottom:14px;"></div>
      <div class="sk-box sk-full"></div>
      <div class="sk-box sk-btn"></div>
    </div>`;
  }
  return out;
}

/* ---------------------------- RENDER: JOB CARD ---------------------------- */

function emptyStateHTML(icon, title, text){
  return `<div class="empty-state">${icon}<h3>${title}</h3><p>${text}</p></div>`;
}

/* ---------------------------- RENDER: LIST VIEW ---------------------------- */
function renderList(){
  const root = document.getElementById('listView');

  if(state.currentNav === 'messages'){
    root.innerHTML = `<div class="placeholder-view">${ICON.inbox}<h3>Belum ada pesan</h3><p>Saat perekrut membalas lamaranmu, percakapan akan muncul di sini.</p></div>`;
    return;
  }
  if(state.currentNav === 'profile'){
    root.innerHTML = `
      <div class="profile-card"><div class="av">AM</div><div><div style="font-weight:700;font-family:var(--font-display);font-size:16px;">Amin</div><div style="font-size:12.5px;color:var(--slate);margin-top:2px;">Pencari Kerja · Jawa Barat</div></div></div>
      <div class="profile-row">${ICON.briefcase} Riwayat Lamaran</div>
      <div class="profile-row">${ICON.bookmark} Loker Tersimpan (${state.saved.size})</div>
      <div class="profile-row">${ICON.clock} Notifikasi Loker Baru</div>
    `;
    return;
  }

  let listToRender;
  if(state.currentNav === 'saved'){
    listToRender = state.jobs.filter(j=>state.saved.has(j.id));
  } else {
    listToRender = getFilteredJobs();
  }

  document.getElementById('resultCount').textContent = state.loading ? '' : `${listToRender.length} loker`;

  let html = '';
  if(state.usingDemo && !state.demoBannerDismissed && !state.loading && state.currentNav==='home'){
    html += `<div class="demo-banner">⚙ Mode Demo — data contoh, belum tersambung ke Google Sheets <button id="dismissBanner">${ICON.x}</button></div>`;
  }

  if(state.loading){
    html += skeletonHTML();
  } else if(listToRender.length === 0){
    if(state.currentNav === 'saved'){
      html += emptyStateHTML(ICON.bookmark.replace('15','46').replace('15','46'), "Belum ada loker tersimpan", "Ketuk ikon bookmark pada kartu loker untuk menyimpannya di sini.");
    } else {
      html += emptyStateHTML(ICON.search, "Loker tidak ditemukan", "Coba ubah kata kunci pencarian atau atur ulang filter yang aktif.");
    }
  } else {
    html += listToRender.map(jobCardHTML).join('');
  }

  root.innerHTML = html;

  root.querySelectorAll('[data-apply]').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation(); openDetail(parseInt(btn.dataset.apply)); });
  });
  root.querySelectorAll('[data-save]').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation(); toggleSave(parseInt(btn.dataset.save)); });
  });
  root.querySelectorAll('.job-card').forEach(card=>{
    card.addEventListener('click', ()=> openDetail(parseInt(card.dataset.id)));
  });
  const dismissBtn = document.getElementById('dismissBanner');
  if(dismissBtn) dismissBtn.addEventListener('click', e=>{ e.stopPropagation(); state.demoBannerDismissed = true; renderList(); });
}

function toggleSave(id){
  if(state.saved.has(id)) state.saved.delete(id); else state.saved.add(id);
  renderList();
  if(state.detailJobId === id) renderDetail(id);
}

/* ---------------------------- RENDER: DETAIL VIEW ---------------------------- */
function openDetail(id){
  state.detailJobId = id;
  renderDetail(id);
  document.getElementById('detailView').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeDetail(){
  document.getElementById('detailView').classList.remove('show');
  document.body.style.overflow = '';
  setTimeout(()=>{ state.detailJobId = null; }, 320);
}
function renderDetail(id){
  const job = state.jobs.find(j=>j.id===id) || DEMO_JOBS.find(j=>j.id===id);
  if(!job) return;
  const isSaved = state.saved.has(job.id);
  const view = document.getElementById('detailView');
  view.innerHTML = `
    <div class="detail-header">
      <button class="icon-btn" id="detailBack">${ICON.back}</button>
      <div class="spacer"></div>
      <button class="icon-btn">${ICON.share}</button>
    </div>
    <div class="detail-hero">
      <div class="detail-logo">${job.logo}</div>
      <h1 class="detail-title">${job.title}</h1>
      <div class="detail-company">${job.company} ${job.verified?ICON.shield:''}</div>
      <div class="detail-meta-row">
        <span>${ICON.pin} ${job.location}</span>
        <span>${ICON.clock} ${timeAgo(job.postedHoursAgo)}</span>
      </div>
    </div>
    <div class="stat-strip">
      <div class="stat-pill salary"><div class="lbl">Gaji / Bulan</div><div class="val">${fmtIDRShort(job.salaryMin)}–${fmtIDRShort(job.salaryMax)}</div></div>
      <div class="stat-pill"><div class="lbl">Tipe</div><div class="val">${job.jobType}</div></div>
      <div class="stat-pill"><div class="lbl">Pengalaman</div><div class="val">${job.experience}</div></div>
      <div class="stat-pill"><div class="lbl">Jarak</div><div class="val">${job.distanceKm} km</div></div>
    </div>

    <div class="detail-section">
      <h4>Deskripsi Pekerjaan</h4>
      <p>${job.description}</p>
    </div>

    <div class="detail-section">
      <h4>Kualifikasi</h4>
      <ul class="req-list">${job.requirements.map(r=>`<li>${ICON.check}<span>${r}</span></li>`).join('')}</ul>
    </div>

    <div class="detail-section">
      <h4>Tunjangan & Benefit</h4>
      <div class="benefit-row">${job.benefits.map(b=>`<span class="tag">${b}</span>`).join('')}</div>
    </div>

    <div class="detail-section company-card">
      <div class="logo-sm">${job.logo}</div>
      <div class="info">
        <div class="name">${job.company} ${job.verified?ICON.shield:''}</div>
        <div class="rating">${ICON.star} ${job.rating} · ${job.companyDesc}</div>
      </div>
    </div>

    <div class="detail-section recruiter-card">
      <div class="av">${job.recruiter.avatar}</div>
      <div class="info">
        <div class="name">${job.recruiter.name}</div>
        <div class="role">${job.recruiter.role} di ${job.company}</div>
      </div>
      <button class="chat-btn">${ICON.chat} Chat</button>
    </div>

    <div style="height:8px;"></div>

    <div class="detail-sticky-bar">
      <button class="save-toggle-btn ${isSaved?'saved':''}" id="detailSaveBtn">${isSaved?ICON.bookmarkFilled:ICON.bookmark}</button>
      <button class="apply-btn" id="detailApplyBtn">Lamar Sekarang ${ICON.arrowRight}</button>
    </div>
  `;
  document.getElementById('detailBack').addEventListener('click', closeDetail);
  document.getElementById('detailSaveBtn').addEventListener('click', ()=>toggleSave(job.id));
  document.getElementById('detailApplyBtn').addEventListener('click', ()=>{
    const btn = document.getElementById('detailApplyBtn');
    btn.textContent = '✓ Lamaran Terkirim';
    btn.style.background = 'var(--teal)';
    btn.disabled = true;
  });
}

/* ---------------------------- FILTER SHEET ---------------------------- */
function filterSheetHTML(){
  const f = state.filters;
  const jobTypes = ["Penuh Waktu","Kontrak / Mitra","Harian"];
  const experiences = ["Tidak Perlu Pengalaman","1-2 Tahun","3+ Tahun"];
  const cats = CATEGORIES.filter(c=>c!=="Semua Kategori");
  return `
    <div class="sheet-handle"></div>
    <div class="sheet-header"><h3>Filter Pencarian</h3><button class="icon-btn" id="closeSheet" style="background:var(--cloud);color:var(--ink);">${ICON.x}</button></div>
    <div class="sheet-body">
      <div class="filter-group">
        <div class="lbl">Kategori</div>
        <div class="chip-grid">${cats.map(c=>`<button class="opt-chip ${f.categories.includes(c)?'active':''}" data-fcat="${c}">${c}</button>`).join('')}</div>
      </div>
      <div class="filter-group">
        <div class="lbl">Tipe Pekerjaan</div>
        <div class="chip-grid">${jobTypes.map(c=>`<button class="opt-chip ${f.jobTypes.includes(c)?'active':''}" data-ftype="${c}">${c}</button>`).join('')}</div>
      </div>
      <div class="filter-group">
        <div class="lbl">Pengalaman</div>
        <div class="chip-grid">${experiences.map(c=>`<button class="opt-chip ${f.experience.includes(c)?'active':''}" data-fexp="${c}">${c}</button>`).join('')}</div>
      </div>
      <div class="filter-group">
        <div class="lbl">Gaji Minimum</div>
        <div class="range-display"><span>${fmtIDRShort(f.minSalary)}</span><span>15jt+</span></div>
        <input type="range" min="0" max="15000000" step="500000" value="${f.minSalary}" id="salarySlider">
      </div>
      <div class="filter-group">
        <div class="toggle-row">
          <span class="lbl">Hanya tampilkan loker mendesak</span>
          <button class="switch ${f.urgentOnly?'on':''}" id="urgentSwitch"></button>
        </div>
      </div>
      <div class="filter-group" style="margin-bottom:0;">
        <div class="lbl">Urutkan</div>
        <select class="select-pill" id="sortSelect">
          ${["Terbaru","Gaji Tertinggi","Jarak Terdekat"].map(s=>`<option ${f.sort===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="reset-btn" id="resetFilters">Reset</button>
      <button class="apply-btn" id="applyFilters">Terapkan Filter</button>
    </div>
  `;
}
function openFilterSheet(){
  document.getElementById('filterSheet').innerHTML = filterSheetHTML();
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('filterSheet').classList.add('show');
  document.body.style.overflow = 'hidden';
  bindSheetEvents();
}
function closeFilterSheet(){
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('filterSheet').classList.remove('show');
  document.body.style.overflow = '';
}
function bindSheetEvents(){
  const sheet = document.getElementById('filterSheet');
  sheet.querySelectorAll('[data-fcat]').forEach(b=>b.addEventListener('click', ()=>toggleFilterVal('categories', b.dataset.fcat, b)));
  sheet.querySelectorAll('[data-ftype]').forEach(b=>b.addEventListener('click', ()=>toggleFilterVal('jobTypes', b.dataset.ftype, b)));
  sheet.querySelectorAll('[data-fexp]').forEach(b=>b.addEventListener('click', ()=>toggleFilterVal('experience', b.dataset.fexp, b)));
  const slider = document.getElementById('salarySlider');
  slider.addEventListener('input', ()=>{
    state.filters.minSalary = parseInt(slider.value);
    sheet.querySelector('.range-display span').textContent = fmtIDRShort(state.filters.minSalary);
  });
  const urgentSwitch = document.getElementById('urgentSwitch');
  urgentSwitch.addEventListener('click', ()=>{
    state.filters.urgentOnly = !state.filters.urgentOnly;
    urgentSwitch.classList.toggle('on', state.filters.urgentOnly);
  });
  document.getElementById('sortSelect').addEventListener('change', e=>{ state.filters.sort = e.target.value; });
  document.getElementById('closeSheet').addEventListener('click', closeFilterSheet);
  document.getElementById('resetFilters').addEventListener('click', ()=>{
    state.filters = {categories:[],jobTypes:[],experience:[],minSalary:0,urgentOnly:false,sort:"Terbaru"};
    openFilterSheet();
  });
  document.getElementById('applyFilters').addEventListener('click', ()=>{
    closeFilterSheet();
    document.getElementById('sortChip').textContent = state.filters.sort;
    renderList();
  });
}
function toggleFilterVal(key, val, btn){
  const arr = state.filters[key];
  const idx = arr.indexOf(val);
  if(idx>-1) arr.splice(idx,1); else arr.push(val);
  btn.classList.toggle('active');
}

/* ---------------------------- BOTTOM NAV ---------------------------- */
function bindBottomNav(){
  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const nav = btn.dataset.nav;
      if(nav === 'search'){
        state.currentNav = 'home';
        document.querySelectorAll('.nav-item')[0].classList.add('active');
        document.getElementById('searchWrap').classList.add('open');
        document.getElementById('searchInput').focus();
        renderList();
        return;
      }
      state.currentNav = nav;
      if(nav === 'messages') document.getElementById('msgDot').style.display = 'none';
      renderList();
    });
  });
}

/* ---------------------------- HEADER INTERACTIONS ---------------------------- */
function bindHeader(){
  const searchToggle = document.getElementById('searchToggle');
  const searchWrap = document.getElementById('searchWrap');
  const searchInput = document.getElementById('searchInput');
  searchToggle.addEventListener('click', ()=>{
    searchWrap.classList.toggle('open');
    if(searchWrap.classList.contains('open')) searchInput.focus();
  });
  searchInput.addEventListener('input', e=>{
    state.searchQuery = e.target.value;
    renderList();
  });

  const catBtn = document.getElementById('categoryBtn');
  catBtn.addEventListener('click', ()=>{
    const panel = document.getElementById('categoryPanel');
    const opening = !panel.classList.contains('show');
    panel.classList.toggle('show', opening);
    catBtn.classList.toggle('open', opening);
  });
  document.addEventListener('click', e=>{
    if(!catBtn.contains(e.target) && !document.getElementById('categoryPanel').contains(e.target)){
      closeDropdown();
    }
  });

  document.getElementById('openFilters').addEventListener('click', openFilterSheet);
  document.getElementById('sheetOverlay').addEventListener('click', closeFilterSheet);
}

/* ---------------------------- INIT ---------------------------- */
function init(){
  renderTabs();
  renderCategoryPanel();
  bindHeader();
  bindBottomNav();
  window.addEventListener('resize', positionUnderline);
  loadJobs();
}
init();
</script>
</body>
</html>
